<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">  <!-- Flask generates correct path to static CSS -->
</head>
<body>
    <a href="/" class="back-btn">← Back</a> <!-- Back button to return to homepage -->
    <div class="login-container">
        <div class="login-box">
            <h1>Login</h1>

            <form method="POST" action="/login">
                <input type="email" name="email" placeholder="Email" required><br><br>
                <input type="password" name="password" placeholder="Password" required><br><br>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

</body>
</html>
