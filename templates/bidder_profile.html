<!DOCTYPE html>
<html>
<head>
    <title>My Profile — NittanyAuction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="first-navbar">
        <a href="/dashboard"><img src="{{ url_for('static', filename='logo.svg') }}" alt="NittanyAuction" height="36"></a>
        <div class="nav-links">
            <span class="nav-user">{{ email }}</span>
            <a href="/bidder">Dashboard</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="seller-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <div class="form-card">
            <h2>My Profile</h2>
            <form method="POST" action="/bidder/profile">

                <div style="display:flex; gap:20px;">
                    <div class="form-group" style="flex:1; min-width:0;">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name"
                               value="{{ profile['first_name'] if profile else '' }}" placeholder="First name">
                    </div>
                    <div class="form-group" style="flex:1; min-width:0;">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name"
                               value="{{ profile['last_name'] if profile else '' }}" placeholder="Last name">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email (cannot be changed)</label>
                    <input type="text" value="{{ email }}" disabled style="background:#f4f4f8; color:#888; cursor:not-allowed;">
                </div>

                <div class="form-group">
                    <label for="street">Street Address</label>
                    <input type="text" id="street" name="street"
                           value="{{ profile['street'] if profile else '' }}" placeholder="123 Main St">
                </div>

                <div style="display:flex; gap:20px;">
                    <div class="form-group" style="flex:2; min-width:0;">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city"
                               value="{{ profile['city'] if profile else '' }}" placeholder="Baton Rouge">
                    </div>
                    <div class="form-group" style="flex:1; min-width:0;">
                        <label for="state">State</label>
                        <input type="text" id="state" name="state" maxlength="2"
                               value="{{ profile['state'] if profile else '' }}" placeholder="LA">
                    </div>
                    <div class="form-group" style="flex:1; min-width:0;">
                        <label for="zipcode">ZIP Code</label>
                        <input type="text" id="zipcode" name="zipcode"
                               value="{{ profile['zipcode'] if profile else '' }}" placeholder="70803">
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone_number">Phone Number</label>
                    <input type="tel" id="phone_number" name="phone_number"
                           value="{{ profile['phone_number'] if profile else '' }}" placeholder="(225) 555-0100">
                </div>

                <div class="form-group">
                    <label for="major">Major</label>
                    <input type="text" id="major" name="major"
                           value="{{ profile['major'] if profile else '' }}" placeholder="e.g. Computer Science">
                </div>

                <div style="display:flex; gap:20px;">
                    <div class="form-group" style="flex:1; min-width:0;">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" min="16" max="120"
                               value="{{ profile['age'] if profile and profile['age'] else '' }}" placeholder="21">
                    </div>
                    <div class="form-group" style="flex:2; min-width:0;">
                        <label for="annual_income">Annual Income ($)</label>
                        <input type="number" id="annual_income" name="annual_income" step="0.01" min="0"
                               value="{{ profile['annual_income'] if profile and profile['annual_income'] else '' }}" placeholder="0.00">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save Changes</button>
                    <a href="/bidder" class="btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
