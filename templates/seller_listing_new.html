<!DOCTYPE html>
<html>
<head>
    <title>Create Listing — NittanyAuction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="first-navbar">
        <img src="{{ url_for('static', filename='logo.svg') }}" alt="NittanyAuction" height="36">
        <div class="nav-links">
            <span class="nav-user">{{ email }}</span>
            <a href="/seller/listings">My Listings</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="seller-content">
        <!-- add flash messages for form feedback -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <div class="form-card">
            <h2>Create New Listing</h2>
            <form method="POST" action="/seller/listings/new">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" placeholder="e.g. MacBook Pro 2022" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4" placeholder="Describe the item, its features, and any relevant details..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="condition">Condition</label>
                    <select id="condition" name="condition" required>
                        <option value="" disabled selected>Select condition</option>
                        <option value="New">New</option>
                        <option value="Used">Used</option>
                        <option value="Refurbished">Refurbished</option>
                    </select>
                </div>

                <!-- here the categories are loaded dynamically from the database via the Flask route. -->
                      
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category_id" required>
                        <option value="" disabled selected>Select category</option>
                        {% for cat in categories %}
                        <option value="{{ cat['category_id'] }}">{{ cat['category_name'] }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="reserve_price">Reserve Price ($)</label>
                    <input type="number" id="reserve_price" name="reserve_price" step="0.01" min="0.01" placeholder="0.00" required>
                </div>

                <!-- Auction stop time is required so the system knows when to close the auction -->
                <div class="form-group">
                    <label for="auction_stop_time">Auction End Date & Time</label>
                    <input type="datetime-local" id="auction_stop_time" name="auction_stop_time" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Create Listing</button>
                    <a href="/seller/listings" class="btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
